                  type: boolean
                options[1].image:
                  type: string
                  format: binary
                options[2].textUz:
                  type: string
                options[2].textUzLatin:
                  type: string
                options[2].textRu:
                  type: string
                options[2].isCorrect:
                  type: boolean
                options[2].image:
                  type: string
                  format: binary
                options[3].textUz:
                  type: string
                options[3].textUzLatin:
                  type: string
                options[3].textRu:
                  type: string
                options[3].isCorrect:
                  type: boolean
                options[3].image:
                  type: string
                  format: binary
                options[4].textUz:
                  type: string
                options[4].textUzLatin:
                  type: string
                options[4].textRu:
                  type: string
                options[4].isCorrect:
                  type: boolean
                options[4].image:
                  type: string
                  format: binary
                options[5].textUz:
                  type: string
                options[5].textUzLatin:
                  type: string
                options[5].textRu:
                  type: string
                options[5].isCorrect:
                  type: boolean
                options[5].image:
                  type: string
                  format: binary
      responses:
