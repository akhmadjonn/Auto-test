openapi: 3.1.0
info:
  title: Avtolider API
  description: Uzbekistan UBDD Driving License Exam Preparation Platform
  version: 1.0.0
  contact:
    name: Avtolider Team

servers:
  - url: http://localhost:5000/api/v1
    description: Development
  - url: https://api.avtolider.uz/api/v1
    description: Production

tags:
  - name: Auth
  - name: Categories
  - name: Questions
  - name: Exams
  - name: Practice
  - name: Progress
  - name: Subscriptions
  - name: Payments
  - name: Admin Questions
  - name: Admin Categories
  - name: Admin Dashboard
  - name: Admin Plans
  - name: Admin Payments
  - name: Admin Exam Templates
  - name: Admin Reports
  - name: Admin Audit Log
  - name: Admin Settings
  - name: Admin Users
  - name: Admin Announcements
  - name: Announcements

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LocalizedText:
      type: object
      required: [uz, uzLatin, ru]
      properties:
        uz:
          type: string
          description: Uzbek Cyrillic
        uzLatin:
          type: string
          description: Uzbek Latin
        ru:
          type: string
          description: Russian

    PaginationMeta:
      type: object
      required: [page, pageSize, totalCount, totalPages]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    ApiResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        data: {}
        error:
          $ref: '#/components/schemas/ApiError'

    # ─── Auth ───────────────────────────────────
    SendOtpRequest:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          pattern: '^998[0-9]{9}$'

    SendOtpResponse:
      type: object
      required: [expiresInSeconds, retryAfterSeconds]
      properties:
        expiresInSeconds:
          type: integer
        retryAfterSeconds:
          type: integer

    VerifyOtpRequest:
      type: object
      required: [phoneNumber, code]
      properties:
        phoneNumber:
          type: string
          pattern: '^998[0-9]{9}$'
        code:
          type: string
          minLength: 6
          maxLength: 6

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, expiresAt, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: integer
          description: Unix timestamp
        user:
          $ref: '#/components/schemas/UserDto'

    TelegramLoginRequest:
      type: object
      required: [id, firstName, authDate, hash]
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        authDate:
          type: integer
        hash:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UserDto:
      type: object
      required: [id, phoneNumber, role, subscriptionStatus, preferredLanguage, createdAt]
      properties:
        id:
          type: string
          format: uuid
        phoneNumber:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, admin]
        subscriptionStatus:
          type: string
          enum: [none, active, expired, cancelled]
        preferredLanguage:
          type: string
          enum: [uz, uzLatin, ru]
        createdAt:
          type: string
          format: date-time

    # ─── Tickets ────────────────────────────────
    TicketDto:
      type: object
      required: [ticketNumber, questionCount]
      properties:
        ticketNumber:
          type: integer
        questionCount:
          type: integer

    # ─── Categories ─────────────────────────────
    CategoryTreeDto:
      type: object
      required: [id, name, description, questionCount]
      properties:
        id:
          type: string
          format: uuid
        name:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        iconUrl:
          type: string
          nullable: true
        questionCount:
          type: integer
        children:
          type: array
          items:
            $ref: '#/components/schemas/CategoryTreeDto'

    # ─── Questions ──────────────────────────────
    AnswerOptionDto:
      type: object
      required: [id, text]
      properties:
        id:
          type: string
          format: uuid
        text:
          $ref: '#/components/schemas/LocalizedText'
        imageUrl:
          type: string
          nullable: true

    QuestionDto:
      type: object
      required: [id, text, difficulty, categoryId, categoryName, ticketNumber, answerOptions]
      properties:
        id:
          type: string
          format: uuid
        text:
          $ref: '#/components/schemas/LocalizedText'
        imageUrl:
          type: string
          nullable: true
        difficulty:
          type: integer
          enum: [1, 2, 3]
        categoryId:
          type: string
          format: uuid
        categoryName:
          $ref: '#/components/schemas/LocalizedText'
        ticketNumber:
          type: integer
        answerOptions:
          type: array
          items:
            $ref: '#/components/schemas/AnswerOptionDto'

    # ─── Exams ──────────────────────────────────
    StartExamRequest:
      type: object
      required: [licenseCategory]
      properties:
        templateId:
          type: string
          format: uuid
          nullable: true
        licenseCategory:
          type: string
          enum: [AB, CD]

    ExamQuestionDto:
      type: object
      required: [id, questionId, order, text, answerOptions]
      properties:
        id:
          type: string
          format: uuid
        questionId:
          type: string
          format: uuid
        order:
          type: integer
        text:
          $ref: '#/components/schemas/LocalizedText'
        imageUrl:
          type: string
          nullable: true
        answerOptions:
          type: array
          items:
            $ref: '#/components/schemas/AnswerOptionDto'

    ExamSessionDto:
      type: object
      required: [id, status, totalQuestions, passingScore, timeLimitMinutes, mode, questions]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [inProgress, completed, expired]
        totalQuestions:
          type: integer
        passingScore:
          type: integer
        timeLimitMinutes:
          type: integer
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Null for marathon mode (no timer)
        mode:
          type: string
          enum: [exam, ticket, marathon]
        ticketNumber:
          type: integer
          nullable: true
        questions:
          type: array
          items:
            $ref: '#/components/schemas/ExamQuestionDto'

    SubmitAnswerRequest:
      type: object
      required: [sessionQuestionId, selectedAnswerId]
      properties:
        sessionQuestionId:
          type: string
          format: uuid
        selectedAnswerId:
          type: string
          format: uuid
        timeSpentSeconds:
          type: integer
          nullable: true

    SubmitAnswerResponse:
      type: object
      required: [recorded, answeredCount, totalCount]
      properties:
        recorded:
          type: boolean
        answeredCount:
          type: integer
        totalCount:
          type: integer

    ExamResultQuestionDto:
      type: object
      required: [questionId, text, selectedAnswerId, correctAnswerId, isCorrect]
      properties:
        questionId:
          type: string
          format: uuid
        text:
          $ref: '#/components/schemas/LocalizedText'
        imageUrl:
          type: string
          nullable: true
        selectedAnswerId:
          type: string
          format: uuid
          nullable: true
        correctAnswerId:
          type: string
          format: uuid
        isCorrect:
          type: boolean
        explanation:
          $ref: '#/components/schemas/LocalizedText'
        timeSpentSeconds:
          type: integer
          nullable: true

    ExamResultDto:
      type: object
      required: [examId, score, correctAnswers, totalQuestions, passingScore, passed, timeTakenSeconds, completedAt, questions]
      properties:
        examId:
          type: string
          format: uuid
        score:
          type: integer
        correctAnswers:
          type: integer
        totalQuestions:
          type: integer
        passingScore:
          type: integer
        passed:
          type: boolean
        timeTakenSeconds:
          type: integer
        completedAt:
          type: string
          format: date-time
        questions:
          type: array
          items:
            $ref: '#/components/schemas/ExamResultQuestionDto'

    ExamHistoryItemDto:
      type: object
      required: [examId, score, totalQuestions, passed, completedAt, timeTakenSeconds]
      properties:
        examId:
          type: string
          format: uuid
        score:
          type: integer
        totalQuestions:
          type: integer
        passed:
          type: boolean
        completedAt:
          type: string
          format: date-time
        timeTakenSeconds:
          type: integer

    # ─── Practice ───────────────────────────────
    PracticeQuestionDto:
      type: object
      required: [id, text, categoryName, difficulty, answerOptions, leitnerBox]
      properties:
        id:
          type: string
          format: uuid
        text:
          $ref: '#/components/schemas/LocalizedText'
        imageUrl:
          type: string
          nullable: true
        categoryName:
          $ref: '#/components/schemas/LocalizedText'
        difficulty:
          type: integer
          enum: [1, 2, 3]
        answerOptions:
          type: array
          items:
            $ref: '#/components/schemas/AnswerOptionDto'
        leitnerBox:
          type: integer
          minimum: 0
          maximum: 5

    PracticeSessionDto:
      type: object
      required: [questions, dueReviewCount]
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/PracticeQuestionDto'
        dueReviewCount:
          type: integer

    SubmitPracticeAnswerRequest:
      type: object
      required: [questionId, selectedAnswerId]
      properties:
        questionId:
          type: string
          format: uuid
        selectedAnswerId:
          type: string
          format: uuid
        timeSpentSeconds:
          type: integer
          nullable: true

    PracticeAnswerResultDto:
      type: object
      required: [isCorrect, correctAnswerId, explanation, newLeitnerBox, nextReviewDate]
      properties:
        isCorrect:
          type: boolean
        correctAnswerId:
          type: string
          format: uuid
        explanation:
          $ref: '#/components/schemas/LocalizedText'
        newLeitnerBox:
          type: integer
        nextReviewDate:
          type: string
          format: date-time

    # ─── Progress ───────────────────────────────
    AccuracyDataPoint:
      type: object
      required: [date, accuracy]
      properties:
        date:
          type: string
          format: date
        accuracy:
          type: number
          format: double

    RecentExamSummary:
      type: object
      required: [examId, score, passed, completedAt]
      properties:
        examId:
          type: string
          format: uuid
        score:
          type: integer
        passed:
          type: boolean
        completedAt:
          type: string
          format: date-time

    DashboardDto:
      type: object
      required: [totalQuestionsPracticed, totalExamsTaken, averageExamScore, currentStreak, dueForReview, questionsAnsweredToday, examPassRate, recentExams, accuracyOverTime]
      properties:
        totalQuestionsPracticed:
          type: integer
        totalExamsTaken:
          type: integer
        averageExamScore:
          type: number
          format: double
        currentStreak:
          type: integer
        dueForReview:
          type: integer
        questionsAnsweredToday:
          type: integer
        examPassRate:
          type: number
          format: double
        recentExams:
          type: array
          items:
            $ref: '#/components/schemas/RecentExamSummary'
        accuracyOverTime:
          type: array
          items:
            $ref: '#/components/schemas/AccuracyDataPoint'

    CategoryPerformanceDto:
      type: object
      required: [categoryId, categoryName, totalAttempts, correctAttempts, accuracy, questionsInCategory, questionsPracticed]
      properties:
        categoryId:
          type: string
          format: uuid
        categoryName:
          $ref: '#/components/schemas/LocalizedText'
        totalAttempts:
          type: integer
        correctAttempts:
          type: integer
        accuracy:
          type: number
          format: double
        questionsInCategory:
          type: integer
        questionsPracticed:
          type: integer

    # ─── Subscriptions ──────────────────────────
    PlanDto:
      type: object
      required: [id, name, description, priceInTiyins, durationDays, features]
      properties:
        id:
          type: string
          format: uuid
        name:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        priceInTiyins:
          type: integer
          format: int64
        durationDays:
          type: integer
        features:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'

    CreateSubscriptionRequest:
      type: object
      required: [planId, paymentProvider]
      properties:
        planId:
          type: string
          format: uuid
        paymentProvider:
          type: string
          enum: [payme, click]

    SubscriptionResultDto:
      type: object
      required: [subscriptionId, paymentUrl, status]
      properties:
        subscriptionId:
          type: string
          format: uuid
        paymentUrl:
          type: string
        status:
          type: string
          enum: [none, active, expired, cancelled]

    SubscriptionStatusDto:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [none, active, expired, cancelled]
        planName:
          $ref: '#/components/schemas/LocalizedText'
        expiresAt:
          type: string
          format: date-time
          nullable: true
        autoRenew:
          type: boolean

    # ─── Admin ──────────────────────────────────
    AdminDashboardDto:
      type: object
      required: [totalUsers, activeSubscriptions, totalQuestions, activeQuestions, totalExamsToday, revenueThisMonth]
      properties:
        totalUsers:
          type: integer
        activeSubscriptions:
          type: integer
        totalQuestions:
          type: integer
        activeQuestions:
          type: integer
        totalExamsToday:
          type: integer
        revenueThisMonth:
          type: integer
          format: int64
          description: Amount in tiyins

    BulkImportResultDto:
      type: object
      required: [totalRows, imported, updated, skipped, errors]
      properties:
        totalRows:
          type: integer
        imported:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: object
            required: [row, column, error]
            properties:
              row:
                type: integer
              column:
                type: string
              error:
                type: string

    AdminPlanDto:
      type: object
      required: [id, name, description, priceInTiyins, durationDays, features, isActive, subscriberCount, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        priceInTiyins:
          type: integer
          format: int64
        durationDays:
          type: integer
        features:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        isActive:
          type: boolean
        subscriberCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreatePlanRequest:
      type: object
      required: [name, description, priceInTiyins, durationDays, features, isActive]
      properties:
        name:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        priceInTiyins:
          type: integer
          format: int64
        durationDays:
          type: integer
        features:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        isActive:
          type: boolean

    UpdatePlanRequest:
      type: object
      required: [name, description, priceInTiyins, durationDays, features, isActive]
      properties:
        name:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        priceInTiyins:
          type: integer
          format: int64
        durationDays:
          type: integer
        features:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedText'
        isActive:
          type: boolean

    PaymentTransactionDto:
      type: object
      required: [id, userId, userName, userPhone, provider, amount, currency, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userName:
          type: string
          nullable: true
        userPhone:
          type: string
        provider:
          type: string
          enum: [payme, click]
        providerTransactionId:
          type: string
          nullable: true
        amount:
          type: integer
          format: int64
          description: Amount in tiyins
        currency:
          type: string
          default: UZS
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        planName:
          $ref: '#/components/schemas/LocalizedText'
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    ProviderRevenue:
      type: object
      required: [provider, revenue, count]
      properties:
        provider:
          type: string
        revenue:
          type: integer
          format: int64
        count:
          type: integer

    PeriodRevenue:
      type: object
      required: [date, revenue, count]
      properties:
        date:
          type: string
        revenue:
          type: integer
          format: int64
        count:
          type: integer

    PlanRevenue:
      type: object
      required: [planName, revenue, count]
      properties:
        planName:
          type: string
        revenue:
          type: integer
          format: int64
        count:
          type: integer

    RevenueReportDto:
      type: object
      required: [totalRevenue, transactionCount, averageTransaction, byProvider, byPeriod, byPlan]
      properties:
        totalRevenue:
          type: integer
          format: int64
          description: Amount in tiyins
        transactionCount:
          type: integer
        averageTransaction:
          type: integer
          format: int64
        byProvider:
          type: array
          items:
            $ref: '#/components/schemas/ProviderRevenue'
        byPeriod:
          type: array
          items:
            $ref: '#/components/schemas/PeriodRevenue'
        byPlan:
          type: array
          items:
            $ref: '#/components/schemas/PlanRevenue'

    ExamPoolRuleDto:
      type: object
      required: [categoryId, questionCount]
      properties:
        categoryId:
          type: string
          format: uuid
        categoryName:
          $ref: '#/components/schemas/LocalizedText'
        difficulty:
          type: integer
          enum: [1, 2, 3]
          nullable: true
        questionCount:
          type: integer

    ExamTemplateDto:
      type: object
      required: [id, title, totalQuestions, passingScore, timeLimitMinutes, isActive, poolRules]
      properties:
        id:
          type: string
          format: uuid
        title:
          $ref: '#/components/schemas/LocalizedText'
        totalQuestions:
          type: integer
        passingScore:
          type: integer
        timeLimitMinutes:
          type: integer
        isActive:
          type: boolean
        poolRules:
          type: array
          items:
            $ref: '#/components/schemas/ExamPoolRuleDto'

    CreateExamTemplateRequest:
      type: object
      required: [title, totalQuestions, passingScore, timeLimitMinutes, isActive, poolRules]
      properties:
        title:
          $ref: '#/components/schemas/LocalizedText'
        totalQuestions:
          type: integer
        passingScore:
          type: integer
        timeLimitMinutes:
          type: integer
        isActive:
          type: boolean
        poolRules:
          type: array
          items:
            type: object
            required: [categoryId, questionCount]
            properties:
              categoryId:
                type: string
                format: uuid
              difficulty:
                type: integer
                enum: [1, 2, 3]
                nullable: true
              questionCount:
                type: integer

    AuditLogDto:
      type: object
      required: [id, userId, userName, action, entityType, entityId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userName:
          type: string
          nullable: true
        action:
          type: string
          enum: [Create, Update, Delete, StatusChange, Login, Export]
        entityType:
          type: string
          enum: [Question, Plan, User, ExamTemplate, Setting, Announcement]
        entityId:
          type: string
          nullable: true
        changes:
          type: array
          items:
            type: object
            required: [field]
            properties:
              field:
                type: string
              oldValue:
                type: string
                nullable: true
              newValue:
                type: string
                nullable: true
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    SystemSettingDto:
      type: object
      required: [key, value, description]
      properties:
        key:
          type: string
        value:
          type: string
        description:
          type: string
          nullable: true
        updatedBy:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    UserDetailDto:
      type: object
      required: [id, phoneNumber, role, createdAt, stats]
      properties:
        id:
          type: string
          format: uuid
        phoneNumber:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, admin]
        authProvider:
          type: string
          enum: [phone, telegram]
          nullable: true
        preferredLanguage:
          type: string
          enum: [uz, uzLatin, ru]
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
        subscription:
          type: object
          properties:
            status:
              type: string
              enum: [none, active, expired, cancelled]
            planName:
              $ref: '#/components/schemas/LocalizedText'
            expiresAt:
              type: string
              format: date-time
              nullable: true
            autoRenew:
              type: boolean
        stats:
          type: object
          required: [totalExams, avgScore, passRate, totalQuestionsPracticed, currentStreak, dueForReview]
          properties:
            totalExams:
              type: integer
            avgScore:
              type: number
              format: double
            passRate:
              type: number
              format: double
            totalQuestionsPracticed:
              type: integer
            currentStreak:
              type: integer
            dueForReview:
              type: integer
        recentExams:
          type: array
          items:
            type: object
            required: [examId, score, passed, date]
            properties:
              examId:
                type: string
                format: uuid
              score:
                type: integer
              passed:
                type: boolean
              date:
                type: string
                format: date-time
        payments:
          type: array
          items:
            type: object
            required: [id, amount, provider, status, date]
            properties:
              id:
                type: string
                format: uuid
              amount:
                type: integer
                format: int64
              provider:
                type: string
                enum: [payme, click]
              status:
                type: string
                enum: [pending, completed, failed, refunded]
              date:
                type: string
                format: date-time

    AnnouncementDto:
      type: object
      required: [id, title, content, type, isActive, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          $ref: '#/components/schemas/LocalizedText'
        content:
          $ref: '#/components/schemas/LocalizedText'
        type:
          type: string
          enum: [info, warning, important]
        isActive:
          type: boolean
        startsAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateAnnouncementRequest:
      type: object
      required: [title, content, type, isActive]
      properties:
        title:
