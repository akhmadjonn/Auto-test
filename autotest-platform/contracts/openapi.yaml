          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: difficulty
          in: query
          schema:
            type: integer
            enum: [1, 2, 3]
        - name: ticketNumber
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated admin questions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/QuestionDto'
                          meta:
                            $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Admin Questions]
      operationId: adminCreateQuestion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [categoryId, textUz, textUzLatin, textRu, difficulty, ticketNumber, licenseCategory]
              properties:
                categoryId:
                  type: string
                  format: uuid
                textUz:
                  type: string
                  description: Uzbek Cyrillic
                textUzLatin:
                  type: string
                  description: Uzbek Latin
                textRu:
                  type: string
                  description: Russian
                explanationUz:
                  type: string
                explanationUzLatin:
                  type: string
                explanationRu:
                  type: string
                difficulty:
                  type: integer
                  enum: [1, 2, 3]
                ticketNumber:
                  type: integer
                licenseCategory:
                  type: string
                  enum: [AB, CD, BOTH]
                isActive:
                  type: boolean
                  default: true
                questionImage:
                  type: string
                  format: binary
                options[0].textUz:
                  type: string
                options[0].textUzLatin:
                  type: string
                options[0].textRu:
                  type: string
                options[0].isCorrect:
                  type: boolean
                options[0].image:
                  type: string
                  format: binary
                options[1].textUz:
                  type: string
                options[1].textUzLatin:
                  type: string
                options[1].textRu:
                  type: string
