                options[0].image:
                  type: string
                  format: binary
                options[1].textUz:
                  type: string
                options[1].textUzLatin:
                  type: string
                options[1].textRu:
                  type: string
                options[1].isCorrect:
                  type: boolean
                options[1].image:
                  type: string
                  format: binary
                options[2].textUz:
                  type: string
                options[2].textUzLatin:
                  type: string
                options[2].textRu:
                  type: string
                options[2].isCorrect:
                  type: boolean
                options[2].image:
                  type: string
                  format: binary
                options[3].textUz:
                  type: string
                options[3].textUzLatin:
                  type: string
                options[3].textRu:
                  type: string
                options[3].isCorrect:
                  type: boolean
